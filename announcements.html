<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements | ByteHex Internship Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom Style CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>

  <!-- Custom Cursor Followers -->
  <div class="custom-cursor"></div>
  <div class="custom-cursor-follower"></div>

  <div class="wrapper">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Page Content -->
    <div id="content">
      <!-- Navbar Container -->
      <div id="navbar-container"></div>

      <!-- Main View -->
      <div class="container-fluid p-4">
        <!-- Breadcrumbs -->
        <div id="breadcrumb-container"></div>

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
          <div>
            <h2 class="fw-bold m-0 text-color">Bulletins & Announcements</h2>
            <p class="text-muted m-0" style="font-size: 0.9rem;">Broadcast messages to all interns on the portal</p>
          </div>
          <div>
            <button class="btn btn-primary-custom d-flex align-items-center gap-2" onclick="openAnnouncementModal()">
              <i class="bi bi-megaphone-fill"></i> Post Announcement
            </button>
          </div>
        </div>

        <!-- Announcements Grid -->
        <div class="row g-4" id="announcements-grid">
          <!-- Injected via announcements.js -->
        </div>

      </div>
    </div>
  </div>

  <!-- Announcement Modal -->
  <div class="modal fade" id="announcementModal" tabindex="-1" aria-labelledby="announcementModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border border-light-subtle p-3" style="background-color: var(--bg-color);">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold text-color" id="announcementModalLabel">Create Bulletin</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: var(--text-color) === '#F8FAFC' ? 'invert(1)' : 'none';"></button>
        </div>
        <form id="announcementForm">
          <input type="hidden" id="ann-id">
          <div class="modal-body py-2">
            <div class="mb-3">
              <label for="ann-title" class="form-label fw-semibold" style="font-size: 0.85rem;">Announcement Title</label>
              <input type="text" class="form-control form-control-custom" id="ann-title" placeholder="e.g. Townhall Meeting at 4PM" required>
            </div>
            <div class="mb-3">
              <label for="ann-content" class="form-label fw-semibold" style="font-size: 0.85rem;">Message Content</label>
              <textarea class="form-control form-control-custom" id="ann-content" rows="4" placeholder="Detail your announcement here..." required></textarea>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-secondary px-3" data-bs-dismiss="modal" style="border-radius: 8px;">Cancel</button>
            <button type="submit" class="btn btn-primary-custom px-4" id="btn-save-ann" style="border-radius: 8px;">Publish</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal fade" id="deleteAnnModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border border-light-subtle p-3" style="background-color: var(--bg-color);">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold text-color">Delete Bulletin</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body py-2">
          <p class="text-color m-0">Are you sure you want to delete this announcement?</p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-outline-secondary px-3" data-bs-dismiss="modal" style="border-radius: 8px;">Cancel</button>
          <button type="button" class="btn btn-danger px-4" id="btn-confirm-delete-ann" style="border-radius: 8px;">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle with Popper JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App JS Files -->
  <script src="storage.js"></script>
  <script src="utilities.js"></script>
  <script src="announcements.js"></script>
</body>
</html>
